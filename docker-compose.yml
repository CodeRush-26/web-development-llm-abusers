services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - GROQ_MODEL=${GROQ_MODEL:-llama-3.3-70b-versatile}
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
      args:
        # Browser-reachable origin for Socket.IO (same host as API port when using published ports).
        # For cloud deploy, set e.g. https://api.example.com before docker compose build.
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    environment:
      - PORT=3000
    restart: unless-stopped
